name: yuno

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yuno
      POSTGRES_PASSWORD: yuno
      POSTGRES_DB: yuno
    ports:
      # Host 55432 to avoid clashing with other local Postgres instances;
      # in-network services still connect on postgres:5432.
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuno"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@postgres:5432/yuno
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@postgres:5432/yuno
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - coderunner-sock:/var/run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.runtime.executor

  code-runner:
    build: ./code-runner
    # No network: untrusted code can't phone home.
    network_mode: none
    environment:
      CODE_RUNNER_SOCKET: /var/run/code-runner.sock
    volumes:
      - coderunner-sock:/var/run
    # Resource ceilings for the sandbox.
    mem_limit: 256m
    pids_limit: 64

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

  # extremis memory server — optional, started with `--profile memory`.
  # The ExternalMemoryStrategy degrades gracefully when this is absent, so the
  # core stack boots without it. Configure the image/command for your build.
  extremis:
    profiles: ["memory"]
    image: extremis/server:latest
    environment:
      EXTREMIS_STORE: ${EXTREMIS_STORE:-}
    ports:
      - "8080:8080"

volumes:
  pgdata:
  coderunner-sock:
