name: yuno

services:
  postgres:
    # pgvector image (drop-in PG 16 superset). Stores both the app's data and
    # extremis's long-term memory embeddings (vector(1536), HNSW cosine index).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yuno
      POSTGRES_PASSWORD: yuno
      POSTGRES_DB: yuno
    ports:
      # Host port auto-selected by scripts/dev-up.sh (free-port scan). In-network
      # services always connect on postgres:5432 regardless of the host mapping.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuno"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@postgres:5432/yuno
      REDIS_URL: redis://redis:6379/0
      # extremis long-term memory: embedded SDK, our Postgres + pgvector as the
      # vector store (namespaced per agent), full 1536-dim OpenAI embeddings
      # (reuses OPENAI_API_KEY from .env — no model download, no torch).
      EXTREMIS_STORE: postgres
      EXTREMIS_POSTGRES_URL: postgresql://yuno:yuno@postgres:5432/yuno
      EXTREMIS_EMBEDDER: text-embedding-3-small
      EXTREMIS_EMBEDDING_DIM: "1536"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --timeout-graceful-shutdown bounds reloads so long-lived WS connections
    # can't hang the reloader and take the API down on a code change.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown 3

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@postgres:5432/yuno
      REDIS_URL: redis://redis:6379/0
      # Same extremis config as the backend — the worker runs the engine too and
      # shares the memory store via the same Postgres (no shared file needed).
      EXTREMIS_STORE: postgres
      EXTREMIS_POSTGRES_URL: postgresql://yuno:yuno@postgres:5432/yuno
      EXTREMIS_EMBEDDER: text-embedding-3-small
      EXTREMIS_EMBEDDING_DIM: "1536"
    volumes:
      - ./backend:/app
      - coderunner-sock:/var/run
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # watchfiles gives the worker hot-reload in dev (like uvicorn --reload for the
    # API) so code edits reach the worker without a manual restart.
    command: watchfiles "python -m app.runtime.executor" app

  code-runner:
    build: ./code-runner
    # No network: untrusted code can't phone home.
    network_mode: none
    environment:
      CODE_RUNNER_SOCKET: /var/run/code-runner.sock
    volumes:
      - coderunner-sock:/var/run
    # Resource ceilings for the sandbox.
    mem_limit: 256m
    pids_limit: 64

  frontend:
    build: ./frontend
    environment:
      # Browser-facing; must match the backend's chosen host port (set by dev-up.sh).
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

# Note: extremis runs *embedded* in the backend/worker (the `external` memory
# strategy), backed by the Postgres above — there is no separate memory server.

volumes:
  pgdata:
  coderunner-sock:
